services:
  mindbridge:
    build: .
    container_name: mindbridge
    restart: always
    init: true
    env_file: .env
    volumes:
      - mindbridge-claude:/home/mindbridge/.claude
      - mindbridge-data:/data
      # WORKSPACE_PATH defaults to ${HOME}/workspace. Set it in .env to override
      # — e.g. WORKSPACE_PATH=${HOME}/Documents/workspace for the legacy default.
      - ${WORKSPACE_PATH:-${HOME}/workspace}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    stop_grace_period: 30s

volumes:
  mindbridge-claude:
  mindbridge-data:
